<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AlgoMol - Member Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #0a0f24;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            width: 200px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px rgba(0, 255, 127, 0.5));
            transition: all 0.3s ease-in-out;
        }

        .logo:hover {
            filter: drop-shadow(0 0 40px rgba(0, 255, 127, 1));
            transform: scale(1.05);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: linear-gradient(145deg, #1c1c1c, #2a2a2a);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section {
            margin-bottom: 2rem;
            padding: 2rem;
            border-radius: 10px;
            background: rgba(26, 188, 156, 0.05);
            border: 1px solid rgba(26, 188, 156, 0.2);
            transition: all 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.1);
        }

        h1,
        h2,
        h3 {
            color: #1abc9c;
            margin-bottom: 1.5rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            box-shadow: 0 0 0 2px #1abc9c;
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            background: #1abc9c;
            color: #000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin: 1rem 0;
        }

        button:hover {
            background: #16a085;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.3);
        }

        .hidden {
            display: none;
        }

        #approval-warning {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            padding: 1rem;
            border-radius: 5px;
            margin: 1rem 0;
        }

        .home-link {
            display: inline-block;
            color: #1abc9c;
            text-decoration: none;
            margin-top: 1rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            color: #16a085;
            transform: translateX(5px);
        }

        footer {
            text-align: center;
            padding: 1.5rem 0;
            background-color: #1abc9c;
            color: black;
            margin-top: auto;
        }

        #itemsList {
            width: 100%;
            max-width: 600px;
            margin: 1rem auto;
            padding: 0;
        }

        #itemsList li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            margin: 0.8rem auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 90%;
            text-align: left;
            /* Ensure list item aligns left */
        }

        #itemsList li:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        #itemsList li span {
            flex-grow: 1;
            margin-right: 1rem;
            text-align: left;
            /* Force text alignment to left */
            padding-left: 0.5rem;
            /* Add a little padding from the left edge */
        }

        .delete-btn {
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            background: #2c3e50;
            color: #ecf0f1;
            border: none;
            border-radius: 4px;
            margin: 0 0 0 1rem;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(192, 57, 43, 0.3);
        }

        #crud-section {
            text-align: center;
        }

        #crud-section div {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        #crud-section input[type="text"] {
            flex: 1;
            max-width: 400px;
        }

        #itemsList {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0;
            list-style: none;
        }

        #btnLoad {
            margin: 2rem auto;
            display: block;
        }

        .item-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .item-details {
            font-size: 0.9rem;
            color: #95a5a6;
            margin-top: 0.5rem;
            padding-left: 1rem;
            border-left: 2px solid #1abc9c;
            display: none;
        }

        .item-details.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .toggle-details {
            background: none;
            border: none;
            color: #1abc9c;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            margin: 0 0.5rem;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .toggle-details:hover {
            color: #16a085;
            transform: translateY(0);
            box-shadow: none;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="index.html">
            <img src="/image/icon/algomol_transparent.png" alt="AlgoMol Logo" class="logo">
        </a>
        <h1>Member Access</h1>
    </div>

    <div class="container">
        <div class="section" id="auth-section">
            <div>
                <h2><i class="fas fa-user-plus"></i> Sign Up</h2>
                <input type="text" id="signup-username" placeholder="Username">
                <input type="password" id="signup-password" placeholder="Password">
                <button id="btn-signup"><i class="fas fa-paper-plane"></i> Sign Up</button>
            </div>

            <div>
                <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button id="btn-login"><i class="fas fa-lock-open"></i> Login</button>
            </div>
        </div>

        <div class="section hidden" id="user-section">
            <h2>Welcome, <span id="current-user"></span>!</h2>
            <p id="approval-warning" class="hidden">
                <i class="fas fa-exclamation-triangle"></i>
                Your account is pending approval. Please wait for an admin to approve your account.
            </p>
            <button id="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="section hidden" id="admin-section">
            <h2><i class="fas fa-user-shield"></i> Admin Panel</h2>
            <p>Manage user approvals below:</p>
            <button id="btn-load-pending"><i class="fas fa-sync"></i> Load Unapproved Users</button>
            <ul id="pending-users"></ul>
        </div>

        <div class="section hidden" id="crud-section">
            <h2><i class="fas fa-database"></i> Database Access</h2>
            <div>
                <input type="text" id="inputItem" placeholder="Add new item">
                <button id="btnCreate"><i class="fas fa-plus"></i> Create</button>
            </div>
            <button id="btnLoad"><i class="fas fa-list"></i> Load All Items</button>
            <ul id="itemsList"></ul>
        </div>

        <a href="index.html" class="home-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <footer>
        <p>&copy; 2024 AlgoMol LLC. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/leancloud-storage/dist/av-min.js"></script>
    <script>
        /****************************************
         * 1. Initialize LeanCloud
         ****************************************/
        AV.init({
            appId: 'ZxhupKKmXgSXHf1uyEckW1xv-gzGzoHsz',
            appKey: '3YQM3gLlbLMBy3mmZulgwIlS',
            serverURL: 'https://zxhupkkm.lc-cn-n1-shared.com'
        });

        // DOM references
        const authSection = document.getElementById('auth-section');
        const userSection = document.getElementById('user-section');
        const adminSection = document.getElementById('admin-section');
        const crudSection = document.getElementById('crud-section');

        const signupUsername = document.getElementById('signup-username');
        const signupPassword = document.getElementById('signup-password');
        const btnSignup = document.getElementById('btn-signup');

        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        const btnLogin = document.getElementById('btn-login');

        const currentUserEl = document.getElementById('current-user');
        const approvalWarningEl = document.getElementById('approval-warning');
        const btnLogout = document.getElementById('btn-logout');

        // Admin
        const btnLoadPending = document.getElementById('btn-load-pending');
        const pendingUsers = document.getElementById('pending-users');

        // CRUD
        const inputItem = document.getElementById('inputItem');
        const btnCreate = document.getElementById('btnCreate');
        const btnLoad = document.getElementById('btnLoad');
        const itemsList = document.getElementById('itemsList');

        // LeanCloud class
        const ItemClass = AV.Object.extend('Item');

        /****************************************
         * 2. Check Login State on Page Load
         ****************************************/
        checkLoginState();

        async function canUserDoCRUD(user) {
            if (!user) return false;
            const roles = await user.getRoles();
            return roles.some(role => role.getName() === 'Approved');
        }

        function checkLoginState() {
            const currentUser = AV.User.current();
            if (currentUser) {
                authSection.classList.add('hidden');
                userSection.classList.remove('hidden');
                currentUserEl.textContent = currentUser.getUsername();

                // Check if admin
                if (isAdmin(currentUser)) {
                    adminSection.classList.remove('hidden');
                } else {
                    adminSection.classList.add('hidden');
                }

                // Check if "approved" => can do CRUD
                // const approved = currentUser.get('approved');
                if (canUserDoCRUD(currentUser)) {
                    approvalWarningEl.classList.add('hidden');
                    crudSection.classList.remove('hidden');
                } else {
                    approvalWarningEl.classList.remove('hidden');
                    crudSection.classList.add('hidden');
                }
            } else {
                // Not logged in
                authSection.classList.remove('hidden');
                userSection.classList.add('hidden');
                adminSection.classList.add('hidden');
                crudSection.classList.add('hidden');
            }
        }

        // Simple check: if username === 'admin', we treat them as admin
        // For real security, you'd use LeanCloud Roles or more robust checks
        function isAdmin(user) {
            return user.getUsername() === 'admin';
        }

        /****************************************
         * 3. Sign Up (approved = false)
         ****************************************/
        btnSignup.addEventListener('click', async () => {
            const username = signupUsername.value.trim();
            const password = signupPassword.value.trim();

            if (!username || !password) {
                alert('Please enter a username and password.');
                return;
            }

            const user = new AV.User();
            user.setUsername(username);
            user.setPassword(password);
            // Mark new user as "not approved"
            // user.set('approved', false);

            try {
                await user.signUp();
                alert('Sign up successful (pending admin approval)!');
                checkLoginState();  // user is automatically logged in
            } catch (err) {
                console.error('Sign up error:', err);
                alert(`Sign up failed: ${err.message}`);
            }
        });

        /****************************************
         * 4. Login
         ****************************************/
        btnLogin.addEventListener('click', async () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();

            if (!username || !password) {
                alert('Please enter a username and password.');
                return;
            }

            try {
                await AV.User.logIn(username, password);
                alert('Login successful!');
                checkLoginState();
            } catch (err) {
                console.error('Login error:', err);
                alert(`Login failed: ${err.message}`);
            }
        });

        /****************************************
         * 5. Logout
         ****************************************/
        btnLogout.addEventListener('click', async () => {
            try {
                await AV.User.logOut();
                alert('You have logged out!');
                checkLoginState();
            } catch (err) {
                console.error('Logout error:', err);
            }
        });

        /****************************************
         * 6. Admin: Load & Approve Pending Users
         ****************************************/
        btnLoadPending.addEventListener('click', async () => {
            const currentUser = AV.User.current();
            // Make sure only your "admin" user calls this
            // For real security, you’d do an isAdmin(currentUser) check that fetches roles
            if (!currentUser || !await isAdmin(currentUser)) {
                alert('Only admin can load pending users.');
                return;
            }

            try {
                // --- 1) Fetch ALL users ---
                const allUsersQuery = new AV.Query('_User');
                allUsersQuery.limit(1000); // adjust as needed
                const allUsers = await allUsersQuery.find();

                // --- 2) Fetch the "Approved" role ---
                const roleQuery = new AV.Query(AV.Role);
                roleQuery.equalTo('name', 'Approved');
                const approvedRole = await roleQuery.first();
                if (!approvedRole) {
                    alert('Could not find the "Approved" role in LeanCloud. Make sure it exists.');
                    return;
                }

                // --- 3) Fetch users in "Approved" role ---
                const approvedUsersQuery = approvedRole.getUsers().query();
                approvedUsersQuery.limit(1000);
                const approvedUsers = await approvedUsersQuery.find();

                // Create a set of approved user IDs
                const approvedIds = new Set(approvedUsers.map(u => u.id));

                // --- 4) Filter out the users who are in "Approved" ---
                const notApproved = allUsers.filter(u => !approvedIds.has(u.id));

                // --- 5) Display the Not-Approved Users ---
                pendingUsers.innerHTML = '';
                if (notApproved.length === 0) {
                    pendingUsers.innerHTML = '<li>No unapproved users found.</li>';
                    return;
                }

                notApproved.forEach(u => {
                    const li = document.createElement('li');
                    li.textContent = `Username: ${u.getUsername()}`;

                    const approveBtn = document.createElement('button');
                    approveBtn.textContent = 'Approve';
                    approveBtn.className = 'approve-btn';

                    // Call your role-based "approveUser" method instead of userObj.set('approved', true)
                    // e.g. approveUser(u, li) => adds the user to the "Approved" role
                    approveBtn.addEventListener('click', () => approveUser(u, li));

                    li.appendChild(approveBtn);
                    pendingUsers.appendChild(li);
                });

            } catch (err) {
                console.error('Error loading pending users:', err);
                alert(`Failed to load pending users: ${err.message}`);
            }
        });

        // Deprecated method.
        // async function approveUser(userObj, liElement) {
        //     if (!confirm(`Approve user ${userObj.getUsername()}?`)) {
        //         return;
        //     }
        //     userObj.set('approved', true);
        //     try {
        //         await userObj.save();
        //         if (liElement.parentNode) {
        //             liElement.parentNode.removeChild(liElement);
        //         }
        //         alert(`${userObj.getUsername()} is now approved.`);
        //     } catch (err) {
        //         console.error('Approve error:', err);
        //         alert(`Failed to approve user: ${err.message}`);
        //     }
        // }

        async function approveUser(userObj, liElement) {
            if (!confirm(`Approve user ${userObj.getUsername()}?`)) {
                return;
            }

            try {
                // 1) Query the "Approved" role
                const roleQuery = new AV.Query(AV.Role);
                roleQuery.equalTo('name', 'Approved');
                // If your class permissions for Role require the master key or the Admin role,
                // you might need: { useMasterKey: true }
                const approvedRole = await roleQuery.first();

                if (!approvedRole) {
                    throw new Error('Could not find the "Approved" role. Check LeanCloud console.');
                }

                // 2) Add the user to the "Approved" role
                approvedRole.getUsers().add(userObj);

                // 3) Save the role
                // If your Admin role has "Update" permission on the Role class, this should work
                // Otherwise, pass: approvedRole.save(null, { useMasterKey: true })
                await approvedRole.save();

                // 4) Update UI
                if (liElement.parentNode) {
                    liElement.parentNode.removeChild(liElement);
                }
                alert(`${userObj.getUsername()} is now in the "Approved" role.`);
            } catch (err) {
                console.error('Approve error:', err);
                alert(`Failed to approve user (add to role): ${err.message}`);
            }
        }

        /****************************************
         * 7. CREATE: Everyone with Approved Role.
         ****************************************/
        async function createItem() {
            const currentUser = AV.User.current();
            if (!currentUser) {
                alert('You must be logged in to create items.');
                return;
            }
            // if (!currentUser.get('approved')) {
            //     alert('Your account is not approved yet.');
            //     return;
            // }

            const itemName = inputItem.value.trim();
            if (!itemName) {
                alert('Please enter an item name.');
                return;
            }

            const newItem = new ItemClass();
            newItem.set('name', itemName);

            // Public read & write, but front-end checks login.
            // If you only want the entire DB to be open to all approved users,
            // that’s effectively "any logged-in user with domain security" anyway.
            const acl = new AV.ACL();
            acl.setPublicReadAccess(true);
            acl.setPublicWriteAccess(true);
            newItem.setACL(acl);

            try {
                await newItem.save();
                inputItem.value = '';
                loadItems();
            } catch (err) {
                console.error('Error saving item:', err);
                alert(`Save failed: ${err.message}`);
            }
        }

        /****************************************
         * 8. READ: All Items (Must be approved)
         ****************************************/
        async function loadItems() {
            const currentUser = AV.User.current();
            if (!currentUser) {
                alert('You must be logged in to load items.');
                return;
            }
            // if (!currentUser.get('approved')) {
            //     alert('Your account is not approved yet.');
            //     return;
            // }

            itemsList.innerHTML = '';
            const query = new AV.Query('Item');
            query.descending('createdAt');

            try {
                const results = await query.find();
                results.forEach(item => {
                    const li = document.createElement('li');

                    // Create container for item content
                    const itemContent = document.createElement('div');
                    itemContent.className = 'item-content';

                    // Create main item row
                    const itemMain = document.createElement('div');
                    itemMain.className = 'item-main';

                    // Name span
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = item.get('name');

                    // Control buttons container
                    const controls = document.createElement('div');
                    controls.style.display = 'flex';
                    controls.style.alignItems = 'center';

                    // Toggle details button
                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'toggle-details';
                    toggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i>';

                    // Delete button
                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Delete';
                    delBtn.className = 'delete-btn';
                    delBtn.addEventListener('click', () => deleteItem(item.id, li));

                    // Details section
                    const details = document.createElement('div');
                    details.className = 'item-details';
                    const weight = item.get('weight_kg');
                    // details.textContent = `Weight: ${weight ? weight + ' kg' : 'Not specified'}`;
                    details.textContent = `Weight: ${weight + ' kg'}`;

                    // Add click handler for toggle
                    toggleBtn.addEventListener('click', () => {
                        details.classList.toggle('show');
                        toggleBtn.innerHTML = details.classList.contains('show')
                            ? '<i class="fas fa-chevron-up"></i>'
                            : '<i class="fas fa-chevron-down"></i>';
                    });

                    // Assemble the elements
                    controls.appendChild(toggleBtn);
                    controls.appendChild(delBtn);
                    itemMain.appendChild(nameSpan);
                    itemMain.appendChild(controls);
                    itemContent.appendChild(itemMain);
                    itemContent.appendChild(details);
                    li.appendChild(itemContent);

                    itemsList.appendChild(li);
                });
            } catch (err) {
                console.error('Load error:', err);
                alert(`Load failed: ${err.message}`);
            }
        }

        /****************************************
         * 9. DELETE: Must be approved
         ****************************************/
        async function deleteItem(objectId, liElement) {
            const currentUser = AV.User.current();
            if (!currentUser) {
                alert('You must be logged in to delete items.');
                return;
            }
            // if (!currentUser.get('approved')) {
            //     alert('Your account is not approved yet.');
            //     return;
            // }

            if (!confirm('Are you sure you want to delete this item?')) {
                return;
            }

            const itemToDelete = AV.Object.createWithoutData('Item', objectId);
            try {
                await itemToDelete.destroy();
                if (liElement.parentNode) {
                    liElement.parentNode.removeChild(liElement);
                }
            } catch (err) {
                console.error('Delete error:', err);
                alert(`Delete failed: ${err.message}`);
            }
        }

        // Event listeners
        btnCreate.addEventListener('click', createItem);
        btnLoad.addEventListener('click', loadItems);
    </script>
</body>

</html>
